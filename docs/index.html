<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f3efe4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Судоку">
  <title>Решалка Судоку</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="/apple-touch-icon-precomposed.png">
  <link rel="apple-touch-icon" sizes="167x167" href="/apple-touch-icon-167x167.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon-152x152.png">
  <link rel="apple-touch-icon" sizes="120x120" href="/apple-touch-icon-120x120.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <div class="workspace">
      <section class="board-panel" aria-label="Поле судоку">
        <div class="status-row">
          <p id="status" class="status" aria-live="polite">Выберите клетку и введите число.</p>
        </div>
        <div id="board" class="board" role="grid" aria-label="Сетка судоку"></div>
      </section>

      <section class="controls" aria-label="Панель ввода">
        <div class="controls-heading">
          <p class="eyebrow">Sudoku Solver</p>
          <h1>Решалка Судоку</h1>
        </div>

        <div id="number-pad" class="number-pad" role="group" aria-label="Цифровая панель">
          <button class="pad-button" type="button" data-value="1">1</button>
          <button class="pad-button" type="button" data-value="2">2</button>
          <button class="pad-button" type="button" data-value="3">3</button>
          <button class="pad-button" type="button" data-value="4">4</button>
          <button class="pad-button" type="button" data-value="5">5</button>
          <button class="pad-button" type="button" data-value="6">6</button>
          <button class="pad-button" type="button" data-value="7">7</button>
          <button class="pad-button" type="button" data-value="8">8</button>
          <button class="pad-button" type="button" data-value="9">9</button>
          <button id="erase-button" class="pad-button pad-button-wide" type="button" data-value="0">Стереть</button>
        </div>

        <div class="action-row">
          <button id="new-puzzle-button" class="action-button action-button-new" type="button">Новая задача</button>
          <button id="hint-button" class="action-button action-button-hint" type="button">Подсказка</button>
          <button id="solve-button" class="action-button action-button-primary" type="button">Решить</button>
          <button id="check-button" class="action-button" type="button">Проверить</button>
          <button id="reset-button" class="action-button" type="button">Очистить всё</button>
        </div>
      </section>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
